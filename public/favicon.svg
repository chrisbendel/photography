<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 40">
	<title>4×5 sheet film with burned-in landscape</title>
	<defs>
		<clipPath id="sheet-clip">
			<path d="M 0 0 L 13 0 L 13 1 A 1 1 0 0 0 14 2 L 17 2 A 1 1 0 0 0 18 1 L 18 0 L 19 0 L 19 1 A 1 1 0 0 0 21 1 L 21 0 L 26 0 L 26 1 A 1 1 0 0 0 27 2 L 30 2 A 1 1 0 0 0 31 1 L 31 0 L 32 0 L 32 40 L 0 40 Z" />
		</clipPath>
	</defs>
	<style>
		.sheet { fill: #1a1815; }
		.img { fill: #d4cdbe; }
		@media (prefers-color-scheme: dark) {
			.sheet { fill: #d4cdbe; }
			.img { fill: #1a1815; }
		}
	</style>

	<!--
		4×5 sheet film silhouette (portrait), Ilford FP4 Plus notch code.
		Three rounded dips on top edge, packed near the right corner:
		wide, narrow, wide.
	-->
	<path
		class="sheet"
		d="M 0 0
		   L 13 0 L 13 1
		   A 1 1 0 0 0 14 2
		   L 17 2
		   A 1 1 0 0 0 18 1
		   L 18 0 L 19 0 L 19 1
		   A 1 1 0 0 0 21 1
		   L 21 0 L 26 0 L 26 1
		   A 1 1 0 0 0 27 2
		   L 30 2
		   A 1 1 0 0 0 31 1
		   L 31 0
		   L 32 0
		   L 32 40
		   L 0 40
		   Z"
	/>

	<!-- Burned-in landscape: sun, two ridges, foreground band -->
	<g clip-path="url(#sheet-clip)">
		<circle class="img" cx="9" cy="17" r="2.2" opacity="0.5" />
		<path
			class="img"
			opacity="0.35"
			d="M 0 28 L 5 24 L 10 27 L 14 22 L 19 26 L 24 23 L 32 27 L 32 30 L 0 30 Z"
		/>
		<path
			class="img"
			opacity="0.6"
			d="M 0 33 L 7 24 L 13 30 L 18 21 L 24 28 L 32 25 L 32 36 L 0 36 Z"
		/>
		<rect class="img" x="0" y="36" width="32" height="4" opacity="0.4" />
	</g>
</svg>
